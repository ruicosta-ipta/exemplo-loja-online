
name: loja-online
services:
  app:
    build: .
    ports:
      - 9000:8000
    env_file: loja-online/.env
    develop:
      watch:
        - action: sync
          path: ./loja-online
          target: /usr/src/app
          initial_sync: true
          ignore:
            - virtualenv

        - action: rebuild
          path: requirements.txt